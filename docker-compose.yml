services:
  orchestrator:
    build:
      dockerfile: Dockerfile
    platform: linux/amd64
    ports:
      - "9000:9000"
    volumes:
      - ./Server:/opt/resonance/server
    environment:
      - Orchestrator__UnityServerDockerContextPath=${UNITY_SERVER_DOCKER_CONTEXT_PATH}
      - Orchestrator__UnityServerPath=${UNITY_SERVER_PATH}
